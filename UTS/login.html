<html>

<head>
    <title>Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <center>

            <h1>LOGIN</h1>

            <form id="loginForm">

                <label>Email / Username:</label>
                <br>

                <input type="text"
                id="loginUser"
                placeholder="Masukkan email atau username">

                <br><br>

                <label>Password:</label>
                <br>

                <input type="password"
                id="loginPass"
                placeholder="Masukkan password">

                <br><br>

                <p id="loginError"></p>

                <!-- Tombol Login -->
                <button type="submit">
                    Login
                </button>

            </form>

            <br>

            <a href="register.html">
                Register
            </a>

            <br><br>

            <!-- Link Lupa Password -->
            <a href="lupa-password.html">
                Lupa Password?
            </a>

        </center>

    </div>

    <script src="script.js"></script>

</body>

</html>
