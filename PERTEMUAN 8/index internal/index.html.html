<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Belajar JavaScript</title>
</head>
<body>
 <h1>Belajar JavaScript Dasar</h1>
 <p id="pesan">Klik tombol di bawah ini</p>
 <button onclick="tampilPesan()">Klik Saya</button>
 <script>
 function tampilPesan() {
 // Menampilkan popup
 alert("Hello World!");
 // Menampilkan di console
 console.log("Tombol berhasil diklik");
 // Mengubah teks di halaman
 document.getElementById("pesan").innerHTML
 = "Tombol sudah diklik!";
 }
 </script>
</body>
</html>
